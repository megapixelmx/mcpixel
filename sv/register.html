<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crear Cuenta | MCPixel</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111111;
            background: linear-gradient(135deg, #111111 0%, #1a1a1c 100%);
            color: #f5f5f7;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bg-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e2329 0%, #111111 100%);
        }

        .auth-card {
            background: rgba(25, 25, 27, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            color: #a1a1a6;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #a1a1a6;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 16px;
            color: #f5f5f7;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: #a1a1a6;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .btn-primary {
            width: 100%;
            background: #ffffff;
            color: #111111;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: #f5f5f7;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #a1a1a6;
        }

        .footer-link a {
            color: #f5f5f7;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: rgba(255, 60, 60, 0.2);
            border: 1px solid rgba(255, 80, 80, 0.3);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #ff9f9f;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        .success-message {
            background: rgba(60, 255, 60, 0.1);
            border: 1px solid rgba(80, 255, 80, 0.3);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: #a0ffa0;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="auth-card">
        <div class="header">
            <h1>Crear Cuenta</h1>
            <p>Únete a la comunidad de addons</p>
        </div>
        <div class="error-message" id="registerError"></div>
        <div class="success-message" id="registerSuccess"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Nombre de usuario</label>
                <div class="input-wrapper">
                    <input type="text" id="username" maxlength="15" required placeholder="Ej. GeckoDev">
                </div>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" data-target="password">
                        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirmar contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" data-target="confirmPassword">
                        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Registrarse</button>
        </form>
        <div class="footer-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>
    </div>
    <script>
        const supabaseUrl = 'https://tauciflgtvuuoqqxzucy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhdWNpZmxndHZ1dW9xcXh6dWN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjY1NTUsImV4cCI6MjA5MDY0MjU1NX0.z8eV2KRnq16C5obuyPKhUmeJnGfci9lH-o40QIJuJ5o';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        const errorDiv = document.getElementById('registerError');
        const successDiv = document.getElementById('registerSuccess');
        const submitBtn = document.getElementById('submitBtn');
        
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = document.getElementById(this.dataset.target);
                const icon = this.querySelector('svg');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                } else {
                    input.type = 'password';
                    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                }
            });
        });
        
        async function registerUser(username, password) {
            const { data: existingUser } = await supabaseClient
                .from('users')
                .select('username')
                .eq('username', username)
                .single();
            
            if (existingUser) {
                throw new Error('El nombre de usuario ya existe');
            }
            
            const newUserId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString() + Math.random().toString(36);
            
            const { error: insertError } = await supabaseClient
                .from('users')
                .insert({
                    id: newUserId,
                    username: username,
                    email: `${username}@mcpixel.local`,
                    public_name: username,
                    password_hash: password,
                    role: 'user',
                    created_at: new Date().toISOString()
                });
            
            if (insertError) {
                throw new Error(insertError.message);
            }
            
            return true;
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (password !== confirm) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Las contraseñas no coinciden.';
                return;
            }
            
            if (username.length < 3) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'El nombre de usuario debe tener al menos 3 caracteres.';
                return;
            }
            
            if (username.length > 15) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'El nombre de usuario no puede tener más de 15 caracteres.';
                return;
            }
            
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'El nombre de usuario solo puede contener letras, números y guiones bajos.';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creando cuenta...';
            
            try {
                await registerUser(username, password);
                successDiv.style.display = 'block';
                successDiv.textContent = 'Cuenta creada con éxito. Redirigiendo al login...';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                errorDiv.style.display = 'block';
                if (error.message.includes('duplicate key') || error.message.includes('already exists')) {
                    errorDiv.textContent = 'El nombre de usuario ya existe. Elige otro.';
                } else {
                    errorDiv.textContent = error.message || 'Error al crear la cuenta. Intenta nuevamente.';
                }
                submitBtn.disabled = false;
                submitBtn.textContent = 'Registrarse';
            }
        });
        
        function checkSession() {
            const session = localStorage.getItem('mc_session');
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    if (sessionData.user_id && sessionData.username) {
                        window.location.href = '../index.html';
                    }
                } catch (e) {}
            }
        }
        checkSession();
    </script>
</body>
</html>
