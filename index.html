<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="MCPixel">
    <meta property="og:description" content="MCPixel Una web de Add-Ons, Texturas, Tools, Mapas, Shaders entre otros, donde puedes descargar contenido gratuito sin ver anuncios, aparte de poder publicar tus propios complementos, ofrecemos una interfaz Moderna y interactiva">
    <meta property="og:image" content="https://mcpixel.vercel.app/img/ft/mcpixel_bn.jpg">
    <meta property="og:image:secure_url" content="https://mcpixel.vercel.app/img/ft/mcpixel_bn.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://mcpixel.vercel.app/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="MCPixel">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MCPixel">
    <meta name="twitter:description" content="MCPixel Una web de Add-Ons, Texturas, Tools, Mapas, Shaders entre otros, donde puedes descargar contenido gratuito sin ver anuncios, aparte de poder publicar tus propios complementos, ofrecemos una interfaz Moderna y interactiva">
    <meta name="twitter:image" content="https://mcpixel.vercel.app/img/ft/mcpixel_bn.jpg">
    <title>MCPixel</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="sidebar-overlay" id="overlay"></div>
    <div class="global-overlay" id="modalOverlay">
        <div class="filter-modal-content">
            <div class="filter-image-overlap">
                <img src="img/filter-icon.png" alt="Filtro Icono">
            </div>
            <div class="filter-header-text">
                <h3>Filtro</h3>
                <p>Escoge una Opcion para Ordenar de...</p>
            </div>
            <div class="filter-options-grid">
                <button class="filter-option-btn selected" data-filter="default">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                    Por Defecto
                </button>
                <button class="filter-option-btn" data-filter="popular">
                    <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"></path></svg>
                    Más Populares
                </button>
                <button class="filter-option-btn" data-filter="recent">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Más Recientes
                </button>
                <button class="filter-option-btn" data-filter="downloaded">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Más Descargados
                </button>
                <button class="filter-option-btn" data-filter="updated">
                    <svg viewBox="0 0 24 24"><path d="M11 4H4v7h7V4zM20 4h-7v7h7V4zM11 13H4v7h7v-7zM20 13h-7v7h7v-7z"></path></svg>
                    Actualizados
                </button>
                <button class="filter-option-btn" data-filter="random">
                    <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><polyline points="8 21 3 21 3 16"></polyline><line x1="10" y1="14" x2="3" y2="21"></line></svg>
                    Al Azar
                </button>
            </div>
        </div>
    </div>
    <div class="custom-notification" id="customNotification">
        <div class="notification-content">
            <span class="notification-message" id="notificationMessage"></span>
        </div>
    </div>
    <aside class="sidebar" id="sidebar">
        <div class="user-profile-section" id="profileSection">
            <div class="sidebar-avatar" id="sidebarAvatarIcon">
                <div class="u-head"></div>
                <div class="u-body"></div>
            </div>
            <div class="user-name" id="userNameDisplay">Usuario</div>
        </div>
        <nav class="nav-menu" id="navMenu">
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Inicio
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Skins
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                Servidores
            </a>
            <a href="sc/post.html" class="nav-item" id="publishNav">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
                Publicar
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Categorías
            </a>
            <a href="#" class="nav-item" id="settingsNav">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Ajustes
            </a>
            <div class="bottom-section" id="authBottomSection">
                <a href="sv/login.html" class="nav-item" id="loginNav">
                    <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Iniciar Sesión
                </a>
                <a href="sv/register.html" class="nav-item" id="registerNav">
                    <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="16"/><line x1="16" y1="12" x2="24" y2="12"/></svg>
                    Crear Cuenta
                </a>
                <a href="#" class="nav-item" id="logoutNav" style="display: none;">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Cerrar Sesión
                </a>
            </div>
        </nav>
    </aside>
    <div class="main-wrapper">
        <header class="navbar" id="mainNavbar">
            <img src="img/logo.png" alt="Logo" class="logo-top">
            <div class="profile-trigger" id="toggleBtn">
                <div class="u-head"></div>
                <div class="u-body"></div>
            </div>
        </header>
        <div class="hero-carousel" id="heroCarousel">
            <div class="carousel-container" id="carouselContainer">
                <div class="carousel-track" id="carouselTrack"></div>
                <button class="carousel-btn prev" id="carouselPrev">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button class="carousel-btn next" id="carouselNext">
                    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        </div>
        <div class="filter-bar" id="filterBar">
            <button class="filter-button" id="filterTrigger">
                <svg viewBox="0 0 24 24">
                    <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/>
                </svg>
                <span>Filtro</span>
            </button>
            <span class="filter-name">Ordenar por: Por Defecto</span>
            <div class="search-wrapper">
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-input" id="searchInput" placeholder="Buscar addons por nombre, autor o descripción..." autocomplete="off">
                </div>
                <div class="search-dropdown" id="searchDropdown"></div>
            </div>
        </div>
        <main class="container">
            <div class="addons-list" id="addonsListContainer"></div>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
