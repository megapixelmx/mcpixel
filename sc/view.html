        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Foxy dice: "Viste esto? Eres un hacker! o_O"

        function formatText(text) {
            if (!text) return text;
            let escaped = escapeHtml(text);
            let formatted = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            formatted = formatted.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer nofollow">$1</a>');
            const lines = formatted.split('\n');
            let inList = false;
            let listHtml = '';
            const processedLines = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.trim().startsWith('* ')) {
                    if (!inList) {
                        inList = true;
                        listHtml = '<ul>';
                    }
                    listHtml += '<li>' + escapeHtml(line.substring(2)) + '</li>';
                } else {
                    if (inList) {
                        listHtml += '</ul>';
                        processedLines.push(listHtml);
                        inList = false;
                        listHtml = '';
                    }
                    processedLines.push(line);
                }
            }
            if (inList) {
                listHtml += '</ul>';
                processedLines.push(listHtml);
            }
            return processedLines.join('\n');
        }
        
        function getCurrentSession() {
            const session = localStorage.getItem('mc_session');
            if (session) {
                try {
                    return JSON.parse(session);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }
        
        async function getUserVerifiedStatus(username) {
            if (usersCache[username]) {
                return usersCache[username];
            }
            const { data, error } = await supabaseClient
                .from('users')
                .select('is_verified, username, public_name, avatar_url')
                .eq('username', username)
                .single();
            if (!error && data) {
                usersCache[username] = data;
                return data;
            }
            return { is_verified: false, username: username, public_name: username, avatar_url: null };
        }
        
        async function checkAuthState() {
            const session = getCurrentSession();
            if (session && session.user_id) {
                const { data: userData, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', session.user_id)
                    .single();
                if (userData && !error) {
                    currentUser = userData;
                    currentUserData = userData;
                    if (loginNav) loginNav.style.display = 'none';
                    if (registerNav) registerNav.style.display = 'none';
                    if (logoutNav) logoutNav.style.display = 'flex';
                    if (publishNav) publishNav.classList.remove('disabled');
                    if (settingsNav) settingsNav.classList.remove('disabled');
                    if (userNameDisplay) {

        function loadAddonFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const addonIdParam = urlParams.get('id');
            if (addonIdParam) {
                const stored = localStorage.getItem('selectedAddon');
                if (stored) {
                    try {
                        const addon = JSON.parse(stored);
                        if (addon.addon_id === addonIdParam || addon.id === addonIdParam) {
                            return addon;
                        }
                    } catch (e) {}
                }
            }
            try {
                const stored = localStorage.getItem('selectedAddon');
                if (stored) {
                    return JSON.parse(stored);
                }
            } catch (e) {
                return null;
            }
            return null;
        }
        
        async function incrementDownloadCount(addon) {
            if (!addon || !addon.id) return addon;
            try {
                await supabaseClient.rpc('increment_downloads', { addon_uuid: addon.id });
                addon.downloads = (addon.downloads || 0) + 1;
                localStorage.setItem('selectedAddon', JSON.stringify(addon));
                const urlParams = new URLSearchParams(window.location.search);
                const addonIdParam = urlParams.get('id');
                if (addonIdParam) {
                    const newUrl = `${window.location.pathname}?id=${addonIdParam}`;
                    window.history.replaceState({}, '', newUrl);
                }
                return addon;
            } catch (error) {
                console.error('Error incrementing downloads:', error);
                return addon;
            }
        }
        
        function updateURLWithAddonName(addon) {
            if (!addon || !addon.title) return;
            const slug = addon.title.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
            const safeAddonId = encodeURIComponent(addon.addon_id || '');
            const safeSlug = encodeURIComponent(slug);
            const newUrl = `${window.location.pathname}?id=${safeAddonId}&name=${safeSlug}`;
            window.history.replaceState({}, '', newUrl);
        }
        
        function getPlatformIcon(url) {
            if (url.includes('mediafire.com')) {
                return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 8h8v8H8z"/></svg>`;
            } else if (url.includes('mega.nz')) {
                return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`;
            } else if (url.includes('drive.google.com')) {
                return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 15L12 3L18 15H6z"/><path d="M6 21h12v-3H6v3z"/></svg>`;
            } else if (url.includes('dropbox.com')) {
                return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8L12 4L18 8L12 12L6 8z"/><path d="M6 16L12 20L18 16"/></svg>`;
            } else {
                return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
            }
        }
        
        async function getCommentsForAddon(addonId) {

                .from('comments')
                .select('*')
                .eq('addon_id', addonId)
                .order('created_at', { ascending: true });
            if (error) throw error;
            return data || [];
        }
        
        async function createComment(addonId, addonRefId, content) {
            if (!currentUser) throw new Error('Debes iniciar sesión');
            const { data, error } = await supabaseClient
                .from('comments')
                .insert({
                    addon_id: addonId,
                    addon_ref_id: addonRefId,
                    author_id: currentUser.id,
                    author_name: currentUser.public_name || currentUser.username,
                    content: content
                })
                .select()
                .single();
            if (error) throw error;
            return data;
        }
        
        async function deleteComment(commentId) {
            const { error } = await supabaseClient
                .from('comments')
                .delete()
                .eq('id', commentId);
            if (error) throw error;
        }
        
        async function addReplyToComment(commentId, replyContent) {
            const updateData = replyContent ? { reply_content: replyContent, updated_at: new Date().toISOString() } : { reply_content: null, updated_at: new Date().toISOString() };
            const { data, error } = await supabaseClient
                .from('comments')
                .update(updateData)
                .eq('id', commentId)
                .select()
                .single();
            if (error) throw error;
            return data;
        }

                                    <div class="reply-author">
                                        ${creatorDisplayName} (creador)
                                        ${isCreatorVerified ? '<svg viewBox="0 0 24 24" style="fill: #1d9bf0; width: 12px; height: 12px;"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.97-.81-4.01s-2.62-1.27-4.01-.81C14.67 2.53 13.43 1.65 12 1.65s-2.67.88-3.34 2.19c-1.39-.46-2.97-.2-4.01.81s-1.27 2.62-.81 4.01C2.53 9.33 1.65 10.57 1.65 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.97.81 4.01s2.62 1.27 4.01.81c.67 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.34-2.19c1.39.46 2.97.2 4.01-.81s1.27-2.62.81-4.01c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z"></path></svg>' : ''}
                                    </div>
                                </div>
                                <p style="margin-top:5px;">${formatText(comment.reply_content)}</p>
                            </div>
                        `;
                    } else if (showReplyForm) {
                        commentsHTML += `
                            <button class="btn-reply" data-comment-id="${safeCommentId}" data-reply-btn>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                Responder
                            </button>
                            <div class="reply-form" id="replyForm-${safeCommentId}">
                                <textarea class="reply-input" placeholder="Escribe tu respuesta... **negritas**, * listas y https://enlaces"></textarea>
                                <div class="reply-actions">
                                    <button class="btn-reply-cancel" data-cancel-reply="${safeCommentId}">Cancelar</button>
                                    <button class="btn-reply-submit" data-submit-reply="${safeCommentId}">Responder</button>
                                </div>
                            </div>
                        `;
                    }
                    commentsHTML += `</div>`;
                }
                commentsHTML += `</div>`;
            } else {
                commentsHTML += `<p style="color:#a1a1a6; text-align:center; padding:2rem;">No hay comentarios aún. ¡Sé el primero en comentar!</p>`;
            }
            
            commentsContainer.innerHTML = commentsHTML;
            viewContainer.appendChild(commentsContainer);
            
            const submitBtn = document.getElementById('submitCommentBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', async function() {
                    const textarea = document.getElementById('newCommentText');
                    const text = textarea.value.trim();
                    if (!text) {
                        showNotification('El comentario no puede estar vacío');
                        return;
                    }
                    if (!currentUser) {
                        showNotification('Debes iniciar sesión');
                        return;
                    }
                    try {
                        await createComment(currentAddon.id, currentAddon.addon_id, text);
                        showNotification('Comentario publicado');
                        addonComments = await getCommentsForAddon(currentAddon.id);
                        document.getElementById('commentsSection').remove();
                        await renderCommentsSection();
                    } catch (error) {
                        console.error('Error posting comment:', error);
                        showNotification('Error al publicar comentario');
                    }
                });
            }
            
            document.querySelectorAll('[data-delete-comment]').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const commentId = this.dataset.deleteComment;
                    const comment = addonComments.find(c => c.id === commentId);
                    if (comment && (currentUser?.id === comment.author_id || currentUser?.id === currentAddon.author_id)) {
                        try {
                            await deleteComment(commentId);
                            showNotification('Comentario eliminado');
                            addonComments = await getCommentsForAddon(currentAddon.id);
                            document.getElementById('commentsSection').remove();
                            await renderCommentsSection();
                        } catch (error) {
                            console.error('Error deleting comment:', error);
                            showNotification('Error al eliminar comentario');
                        }
                    }
                });
            });
            
            document.querySelectorAll('[data-delete-reply]').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const commentId = this.dataset.deleteReply;
                    const comment = addonComments.find(c => c.id === commentId);
                    if (comment && currentUser?.id === currentAddon.author_id && comment.reply_content) {
                        try {
                            await addReplyToComment(commentId, null);
                            showNotification('Respuesta eliminada');
                            addonComments = await getCommentsForAddon(currentAddon.id);
                            document.getElementById('commentsSection').remove();
                            await renderCommentsSection();
                        } catch (error) {
                            console.error('Error deleting reply:', error);
                            showNotification('Error al eliminar respuesta');
                        }
                    }
                });
            });
            
            document.querySelectorAll('[data-reply-btn]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const commentId = this.dataset.commentId;
                    const replyForm = document.getElementById(`replyForm-${commentId}`);
                    if (replyForm) {
                        replyForm.classList.add('active');
                    }
                });
            });
            
            document.querySelectorAll('[data-cancel-reply]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const commentId = this.dataset.cancelReply;
                    const replyForm = document.getElementById(`replyForm-${commentId}`);
                    if (replyForm) {
                        replyForm.classList.remove('active');
                        replyForm.querySelector('.reply-input').value = '';
                    }
                });
            });
            
            document.querySelectorAll('[data-submit-reply]').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const commentId = this.dataset.submitReply;
                    const replyForm = document.getElementById(`replyForm-${commentId}`);
                    const input = replyForm.querySelector('.reply-input');
                    const replyText = input.value.trim();
                    if (!replyText) {
                        showNotification('La respuesta no puede estar vacía');
                        return;
                    }
                    if (currentUser?.id !== currentAddon.author_id) {
                        showNotification('Solo el creador del addon puede responder');
                        return;
                    }
                    const comment = addonComments.find(c => c.id === commentId);
                    if (comment && !comment.reply_content) {
                        try {
                            await addReplyToComment(commentId, replyText);
                            showNotification('Respuesta publicada');
                            addonComments = await getCommentsForAddon(currentAddon.id);
                            document.getElementById('commentsSection').remove();
                            await renderCommentsSection();
                        } catch (error) {
                            console.error('Error posting reply:', error);
                            showNotification('Error al publicar respuesta');
                        }
                    }
                });
            });
        }
        
        checkAuthState();
        renderAddonView();
    </script>
</body>
</html>
