<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalles del Addon - MCPixel</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .view-container {
            max-width: 1000px;
            margin: 20px auto 0;
            padding: 1.5rem 2rem 3rem;
            width: 100%;
        }
        .addon-banner {
            width: 100%;
            height: 300px;
            border-radius: 28px;
            background: #1e1e20;
            border: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5);
            position: relative;
        }
        .addon-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .addon-banner iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .gallery-section {
            margin-bottom: 2rem;
            position: relative;
        }
        .gallery-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
            flex: 1;
            border-radius: 20px;
        }
        .gallery-scroll::-webkit-scrollbar {
            display: none;
        }
        .gallery-track {
            display: flex;
            gap: 16px;
            flex-direction: row;
            min-width: min-content;
            padding: 4px 0;
        }
        .gallery-image {
            width: 200px;
            height: 120px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .gallery-image.active {
            border-color: #ff6b00;
            transform: scale(1.02);
        }
        .gallery-image:hover {
            transform: translateY(-4px);
            border-color: #ff6b00;
        }
        .gallery-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .play-overlay svg {
            width: 48px;
            height: 48px;
            fill: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .addon-view-header {
            margin-bottom: 2rem;
        }
        .addon-view-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #f5f5f7;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .addon-view-author {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            color: #a1a1a6;
        }
        .addon-view-author span {
            color: #f5f5f7;
            font-weight: 600;
        }
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
        }
        .verified-badge svg {
            width: 18px;
            height: 18px;
        }
        .meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem 3rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
        }
        .meta-grid-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .meta-grid-item svg {
            width: 24px;
            height: 24px;
            stroke: #a1a1a6;
            stroke-width: 1.8;
            fill: none;
        }
        .meta-grid-item .label {
            display: block;
            font-size: 0.85rem;
            color: #a1a1a6;
            margin-bottom: 4px;
        }
        .meta-grid-item .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f5f5f7;
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 2rem;
        }
        .tag {
            background: rgba(255, 107, 0, 0.12);
            border: 1px solid rgba(255, 107, 0, 0.3);
            color: #ff8c42;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .description-section {
            margin-bottom: 2.5rem;
        }
        .description-section h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f5f5f7;
            margin-bottom: 1rem;
        }
        .description-content {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 1.8rem;
            color: #d1d1d6;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .description-content strong {
            color: #f5f5f7;
            font-weight: 700;
        }
        .description-content ul {
            list-style: none;
            padding-left: 1.5rem;
            margin: 0.5rem 0;
        }
        .description-content li {
            position: relative;
            margin-bottom: 0.3rem;
        }
        .description-content li::before {
            content: "•";
            color: #ff6b00;
            font-weight: bold;
            position: absolute;
            left: -1.2rem;
        }
        .description-content a {
            color: #1d9bf0;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid rgba(29, 155, 240, 0.3);
            transition: all 0.2s ease;
        }
        .description-content a:hover {
            border-bottom-color: #1d9bf0;
        }
        .downloads-section {
            margin-bottom: 3rem;
        }
        .downloads-section h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f5f5f7;
            margin-bottom: 1.2rem;
        }
        .download-links-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .download-link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .download-link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 107, 0, 0.5);
            transform: scale(1.01);
        }
        .link-info {

        }
        .link-icon {

            height: 32px;

            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .link-icon svg {

            height: 24px;
            stroke: #a1a1a6;
            fill: none;
        }
        .link-name {
            font-weight: 600;
            color: #f5f5f7;
            white-space: nowrap;
        }
        .download-badge {
            background: #ff6b00;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            margin-left: 15px;
        }
        .download-badge svg {
            width: 18px;
            height: 18px;
            stroke: white;
            fill: none;
        }
        .suggested-section {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 2.5rem;
            margin-top: 2rem;
        }
        .suggested-section h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f5f5f7;
            margin-bottom: 1.5rem;
        }
        .suggested-carousel {
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 1rem;
        }
        .suggested-carousel::-webkit-scrollbar {
            display: none;
        }
        .suggested-track {
            display: flex;
            gap: 20px;
        }
        .suggested-card {
            width: 260px;
            height: 160px;
            flex-shrink: 0;
            background: #1e1e20;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .suggested-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b00;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .suggested-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .suggested-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
            padding: 12px 15px;
            pointer-events: none;
        }
        .suggested-name {
            font-weight: 700;
            color: #ffffff;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .custom-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(23, 26, 30, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 12px 24px;
            color: #f5f5f7;
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 3000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 350px;
        }
        .custom-notification.show {
            transform: translateX(0);
        }
        .notification-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .notification-content::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #ff6b00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff6b00;
        }
        @media (max-width: 768px) {
            .navbar { left: 0; }
            .view-container { padding: 1rem; margin-top: 60px; }
            .addon-banner { height: 200px; border-radius: 20px; }
            .addon-view-title { font-size: 1.8rem; }
            .meta-grid { gap: 1.5rem; padding: 1.2rem; }
            .download-link-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .link-info { width: 100%; }
            .download-badge { align-self: flex-end; margin-left: 0; }
            .gallery-image { width: 150px; height: 90px; }
            .play-overlay svg { width: 32px; height: 32px; }
            .suggested-card { width: 220px; height: 140px; }
        }
    </style>
</head>

    <script>
        const supabaseUrl = 'https://tauciflgtvuuoqqxzucy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhdWNpZmxndHZ1dW9xcXh6dWN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjY1NTUsImV4cCI6MjA5MDY0MjU1NX0.z8eV2KRnq16C5obuyPKhUmeJnGfci9lH-o40QIJuJ5o';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const toggleBtn = document.getElementById('toggleBtn');
        const navbar = document.getElementById('mainNavbar');
        const viewContainer = document.getElementById('viewContainer');
        const customNotification = document.getElementById('customNotification');
        const notificationMessage = document.getElementById('notificationMessage');
        const sidebarAvatar = document.getElementById('sidebarAvatarIcon');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const loginNav = document.getElementById('loginNav');
        const registerNav = document.getElementById('registerNav');
        const logoutNav = document.getElementById('logoutNav');
        const publishNav = document.getElementById('publishNav');
        const settingsNav = document.getElementById('settingsNav');
        const profileSection = document.getElementById('profileSection');
        
        let currentUser = null;
        let currentUserData = null;
        let currentAddon = null;
        let usersCache = {};
        let currentDisplayUrl = null;
        let currentIsVideo = false;
        
        function showNotification(message) {
            notificationMessage.textContent = message;
            customNotification.classList.add('show');
            setTimeout(() => {
                customNotification.classList.remove('show');
            }, 3000);
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
            return num.toString();
        }
        
        function getYouTubeId(url) {
            if (!url) return null;
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?#/]+)/,
                /youtube\.com\/shorts\/([^&?#/]+)/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match && match[1]) return match[1];
            }
            return null;
        }
        
        function formatText(text) {
            if (!text) return text;
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            formatted = formatted.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
            const lines = formatted.split('\n');
            let inList = false;
            let listHtml = '';
            const processedLines = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.trim().startsWith('* ')) {
                    if (!inList) {
                        inList = true;
                        listHtml = '<ul>';
                    }
                    listHtml += '<li>' + line.substring(2) + '</li>';
                } else {
                    if (inList) {
                        listHtml += '</ul>';
                        processedLines.push(listHtml);
                        inList = false;
                        listHtml = '';
                    }
                    processedLines.push(line);
                }
            }
            if (inList) {
                listHtml += '</ul>';
                processedLines.push(listHtml);
            }
            return processedLines.join('\n');
        }
        
        function getCurrentSession() {
            const session = localStorage.getItem('mc_session');
            if (session) {
                try {
                    return JSON.parse(session);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }
        
        async function getUserVerifiedStatus(username) {
            if (usersCache[username]) return usersCache[username];
            const { data, error } = await supabaseClient
                .from('users')
                .select('is_verified, username, public_name, avatar_url')
                .eq('username', username)
                .single();
            if (!error && data) {
                usersCache[username] = data;
                return data;
            }
            return { is_verified: false, username: username, public_name: username, avatar_url: null };
        }
        
        async function checkAuthState() {
            const session = getCurrentSession();
            if (session && session.user_id) {
                const { data: userData, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', session.user_id)
                    .single();
                if (userData && !error) {
                    currentUser = userData;
                    currentUserData = userData;
                    if (loginNav) loginNav.style.display = 'none';
                    if (registerNav) registerNav.style.display = 'none';
                    if (logoutNav) logoutNav.style.display = 'flex';
                    if (userData.is_verified) {
                        if (publishNav) publishNav.style.display = 'flex';
                    } else {
                        if (publishNav) publishNav.style.display = 'none';
                    }
                    if (settingsNav) settingsNav.classList.remove('disabled');
                    if (userNameDisplay) userNameDisplay.textContent = userData.public_name || userData.username;
                    if (sidebarAvatar && userData.avatar_url) {
                        sidebarAvatar.style.backgroundImage = `url('${userData.avatar_url}')`;
                        sidebarAvatar.querySelectorAll('.u-head, .u-body').forEach(el => el.style.opacity = '0');
                    }
                    if (toggleBtn && userData.avatar_url) {
                        toggleBtn.style.backgroundImage = `url('${userData.avatar_url}')`;
                        toggleBtn.querySelectorAll('.u-head, .u-body').forEach(el => el.style.opacity = '0');
                    }
                }
            } else {
                currentUser = null;
                currentUserData = null;
                if (loginNav) loginNav.style.display = 'flex';
                if (registerNav) registerNav.style.display = 'flex';
                if (logoutNav) logoutNav.style.display = 'none';
                if (publishNav) publishNav.style.display = 'none';
                if (settingsNav) settingsNav.classList.add('disabled');
                if (userNameDisplay) userNameDisplay.textContent = 'Invitado';
                if (sidebarAvatar) {
                    sidebarAvatar.style.backgroundImage = 'none';
                    const head = sidebarAvatar.querySelector('.u-head');
                    const body = sidebarAvatar.querySelector('.u-body');
                    if (head) head.style.opacity = '1';
                    if (body) body.style.opacity = '1';
                }
                if (toggleBtn) {
                    toggleBtn.style.backgroundImage = 'none';
                    const head = toggleBtn.querySelector('.u-head');
                    const body = toggleBtn.querySelector('.u-body');
                    if (head) head.style.opacity = '1';
                    if (body) body.style.opacity = '1';
                }
            }
        }
        
        function logout() {
            localStorage.removeItem('mc_session');
            localStorage.removeItem('mc_user');
            window.location.href = '../index.html';
        }
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });
        
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });
        }
        if (overlay) {
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
        if (logoutNav) {
            logoutNav.addEventListener('click', async (e) => {
                e.preventDefault();
                logout();
            });
        }
        if (profileSection) {
            profileSection.addEventListener('click', () => {
                if (currentUser) window.location.href = 'profile.html';
                else showNotification('Debes iniciar sesión para ver tu perfil');
            });
        }
        
        function loadAddonFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const addonIdParam = urlParams.get('id');
            if (addonIdParam) {
                const stored = localStorage.getItem('selectedAddon');
                if (stored) {
                    try {
                        const addon = JSON.parse(stored);
                        if (addon.addon_id === addonIdParam || addon.id === addonIdParam) return addon;
                    } catch (e) {}
                }
            }
            try {
                const stored = localStorage.getItem('selectedAddon');
                if (stored) return JSON.parse(stored);
            } catch (e) {
                return null;
            }
            return null;
        }
        
        async function incrementDownloadCount(addon) {
            if (!addon || !addon.id) return addon;
            try {
                await supabaseClient.rpc('increment_downloads', { addon_uuid: addon.id });
                addon.downloads = (addon.downloads || 0) + 1;
                localStorage.setItem('selectedAddon', JSON.stringify(addon));
                return addon;
            } catch (error) {
                console.error('Error incrementing downloads:', error);
                return addon;
            }
        }
        
        function updateURLWithAddonName(addon) {
            if (!addon || !addon.title) return;
            const slug = addon.title.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
            const newUrl = `${window.location.pathname}?id=${addon.addon_id}&name=${slug}`;
            window.history.replaceState({}, '', newUrl);
        }
        
        function getPlatformIcon(url) {
            if (url.includes('mediafire.com')) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 8h8v8H8z"/></svg>`;
            else if (url.includes('mega.nz')) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`;
            else if (url.includes('drive.google.com')) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 15L12 3L18 15H6z"/><path d="M6 21h12v-3H6v3z"/></svg>`;
            else if (url.includes('dropbox.com')) return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8L12 4L18 8L12 12L6 8z"/><path d="M6 16L12 20L18 16"/></svg>`;
            else return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
        }
        
        function updateBannerDisplay(url, isVideo) {
            const bannerContainer = document.getElementById('mainBanner');
            if (!bannerContainer) return;
            if (isVideo && url) {
                const videoId = getYouTubeId(url);
                if (videoId) bannerContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
                else bannerContainer.innerHTML = `<img src="${url}" alt="Portada" onerror="this.src='../img/default-banner.png'">`;
            } else {
                bannerContainer.innerHTML = `<img src="${url || '../img/default-banner.png'}" alt="Portada" onerror="this.src='../img/default-banner.png'">`;
            }
        }
        
        function changeMainDisplay(url, isVideo) {
            currentDisplayUrl = url;
            currentIsVideo = isVideo;
            updateBannerDisplay(url, isVideo);
        }
        
        function renderGallery() {
            if (!currentAddon) return '';
            const allImages = [];
            const addedUrls = new Set();
            if (currentAddon.video_url && getYouTubeId(currentAddon.video_url)) {
                if (!addedUrls.has(currentAddon.video_url)) {
                    allImages.push({ type: 'video', url: currentAddon.video_url, title: 'Video' });
                    addedUrls.add(currentAddon.video_url);
                }
            }
            if (currentAddon.banner_url) {
                if (!addedUrls.has(currentAddon.banner_url)) {
                    allImages.push({ type: 'image', url: currentAddon.banner_url, title: 'Portada' });
                    addedUrls.add(currentAddon.banner_url);
                }
            }
            if (currentAddon.gallery && currentAddon.gallery.length > 0) {
                currentAddon.gallery.forEach(img => {
                    if (img && img.url && !addedUrls.has(img.url)) {
                        allImages.push({ type: 'image', url: img.url, title: 'Galería' });
                        addedUrls.add(img.url);
                    }
                });
            }
            if (allImages.length <= 1) return '';
            if (allImages.length > 0 && !currentDisplayUrl) {
                const firstItem = allImages[0];
                currentDisplayUrl = firstItem.url;
                currentIsVideo = firstItem.type === 'video';
            }
            let galleryHTML = `<div class="gallery-section"><div class="gallery-scroll"><div class="gallery-track">`;
            allImages.forEach((item, index) => {
                const isActive = (item.type === 'video' && currentIsVideo && currentDisplayUrl === item.url) || 
                                (item.type === 'image' && !currentIsVideo && currentDisplayUrl === item.url);
                const activeClass = isActive ? 'active' : '';
                if (item.type === 'video') {
                    const videoId = getYouTubeId(item.url);
                    galleryHTML += `
                        <div class="gallery-image ${activeClass}" data-url="${item.url}" data-type="video">
                            <img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" alt="Video">
                            <div class="play-overlay">
                                <svg viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </div>
                        </div>
                    `;
                } else {
                    galleryHTML += `
                        <div class="gallery-image ${activeClass}" data-url="${item.url}" data-type="image">
                            <img src="${item.url}" alt="Imagen" onerror="this.src='../img/default-banner.png'">
                        </div>
                    `;
                }
            });
            galleryHTML += `</div></div></div>`;
            return galleryHTML;
        }
        
        function initGalleryEvents() {
            const galleryImages = document.querySelectorAll('.gallery-image');
            galleryImages.forEach(img => {
                img.addEventListener('click', () => {
                    const url = img.dataset.url;
                    const type = img.dataset.type;
                    changeMainDisplay(url, type === 'video');
                    galleryImages.forEach(i => i.classList.remove('active'));
                    img.classList.add('active');
                });
            });
        }

        async function renderSuggestedAddons() {
            try {
                const { data, error } = await supabaseClient
                    .from('addons')
                    .select('*')
                    .neq('id', currentAddon.id);
                
                if (error) throw error;
                
                const randomAddons = data.sort(() => 0.5 - Math.random()).slice(0, 10);
                const suggestedContainer = document.createElement('div');
                suggestedContainer.className = 'suggested-section';
                
                let html = `<h3>Addons Sugeridos</h3>
                            <div class="suggested-carousel">
                                <div class="suggested-track">`;
                
                randomAddons.forEach(item => {
                    html += `
                        <div class="suggested-card" data-addon='${JSON.stringify(item).replace(/'/g, "&#39;")}'>
                            <img src="${item.banner_url || '../img/default-banner.png'}" class="suggested-thumb" onerror="this.src='../img/default-banner.png'">
                            <div class="suggested-info">
                                <div class="suggested-name">${item.title}</div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
                suggestedContainer.innerHTML = html;
                viewContainer.appendChild(suggestedContainer);
                
                document.querySelectorAll('.suggested-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const addonData = JSON.parse(this.dataset.addon);
                        localStorage.setItem('selectedAddon', JSON.stringify(addonData));
                        window.location.href = `view.html?id=${addonData.addon_id}`;
                    });
                });
            } catch (err) {
                console.error("Error al cargar sugeridos:", err);
            }
        }
        
        async function renderAddonView() {
            const addon = loadAddonFromURL();
            if (!addon) {
                viewContainer.innerHTML = '<div style="text-align:center; padding:3rem; color:#a1a1a6;">No se ha seleccionado ningún addon. <a href="../index.html">Volver al inicio</a></div>';
                return;
            }
            currentAddon = addon;
            updateURLWithAddonName(addon);
            const publishDate = new Date(addon.publish_date).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
            const updateDate = addon.updated_at ? new Date(addon.updated_at).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' }) : 'Sin actualizaciones';
            const tags = addon.tags ? addon.tags.split(',').map(t => t.trim()).filter(t => t) : [];
            let downloadLinksHTML = '';
            if (addon.download_links && addon.download_links.length > 0) {
                downloadLinksHTML = addon.download_links.map((link, index) => {
                    const linkName = addon.link_names && addon.link_names[index] ? addon.link_names[index] : `Download #${index + 1}`;
                    return `
                        <a href="${link}" target="_blank" class="download-link-card" data-url="${link}">
                            <div class="link-info">
                                <div class="link-icon">
                                    ${getPlatformIcon(link)}
                                </div>
                                <span class="link-name">${linkName}</span>
                            </div>
                            <span class="download-badge">
                                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                Descargar
                            </span>
                        </a>
                    `;
                }).join('');
            } else {
                downloadLinksHTML = '<p style="color:#a1a1a6;">No hay enlaces de descarga disponibles.</p>';
            }
            const authorInfo = await getUserVerifiedStatus(addon.author_name);
            const isAuthorVerified = authorInfo.is_verified === true;
            const authorDisplayName = authorInfo.public_name || addon.author_name;
            const downloadsFormatted = formatNumber(addon.downloads || 0);
            let galleryHTML = renderGallery();
            
            const initialVideoId = getYouTubeId(addon.video_url);
            const bannerContent = initialVideoId ? 
                `<iframe src="https://www.youtube.com/embed/${initialVideoId}" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>` : 
                `<img src="${addon.banner_url || '../img/default-banner.png'}" alt="${addon.title}" onerror="this.src='../img/default-banner.png'">`;

            let html = `
                <div class="addon-banner" id="mainBanner">
                    ${bannerContent}
                </div>
                ${galleryHTML}
                <div class="addon-view-header">
                    <h1 class="addon-view-title">${addon.title}</h1>
                    <div class="addon-view-author">
                        By <span>${authorDisplayName}</span>
                        ${isAuthorVerified ? `
                        <span class="verified-badge">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M9 12l2 2 4-4" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>` : ''}
                    </div>
                </div>
                <div class="meta-grid">
                    <div class="meta-grid-item">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <div>
                            <span class="label">Publicado</span>
                            <span class="value">${publishDate}</span>
                        </div>
                    </div>
                    <div class="meta-grid-item">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <div>
                            <span class="label">Actualizado</span>
                            <span class="value">${updateDate}</span>
                        </div>
                    </div>
                    <div class="meta-grid-item">
                        <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                        <div>
                            <span class="label">Versión</span>
                            <span class="value">${addon.version || 'v1.0.0'}</span>
                        </div>
                    </div>
                    <div class="meta-grid-item">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <div>
                            <span class="label">Descargas</span>
                            <span class="value" id="downloadCountDisplay">${downloadsFormatted}</span>
                        </div>
                    </div>
                </div>
            `;
            if (tags.length > 0) {
                html += `<div class="tags-container">`;
                tags.forEach(tag => { html += `<span class="tag">#${tag}</span>`; });
                html += `</div>`;
            }
            html += `
                <div class="description-section">
                    <h3>Descripción</h3>
                    <div class="description-content">${formatText(addon.description || 'Sin descripción.')}</div>
                </div>
                <div class="downloads-section">
                    <h3>Enlaces de Descarga</h3>
                    <div class="download-links-grid" id="downloadLinksGrid">
                        ${downloadLinksHTML}
                    </div>
                </div>
            `;
            viewContainer.innerHTML = html;
            const allImagesCount = (currentAddon.video_url && getYouTubeId(currentAddon.video_url) ? 1 : 0) + (currentAddon.banner_url ? 1 : 0) + (currentAddon.gallery ? currentAddon.gallery.length : 0);
            if (allImagesCount > 1) initGalleryEvents();
            
            await renderSuggestedAddons();

            document.querySelectorAll('.download-link-card').forEach(linkElement => {
                linkElement.addEventListener('click', async function(e) {
                    e.preventDefault();
                    const url = this.dataset.url;
                    if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                        const updatedAddon = await incrementDownloadCount(addon);
                        currentAddon = updatedAddon;
                        const downloadSpan = document.getElementById('downloadCountDisplay');
                        if (downloadSpan) downloadSpan.textContent = formatNumber(updatedAddon.downloads);
                        window.open(url, '_blank');
                    }
                });
            });
        }
        
        checkAuthState();
        renderAddonView();
    </script>
</body>
</html>
