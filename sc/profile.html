<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil | MCPixel</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .custom-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(23, 26, 30, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 12px 24px;
            color: #f5f5f7;
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 3000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 350px;
        }
        .custom-notification.show {
            transform: translateX(0);
        }
        .notification-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .notification-content::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #ff6b00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff6b00;
        }
        .addons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .addon-card-owner {
            background: rgba(25, 25, 27, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s ease;
        }
        .addon-card-owner:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 107, 0, 0.3);
        }
        .addon-card-owner img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            background: #1e1e20;
        }
        .addon-card-owner-info {
            margin-top: 0.8rem;
        }
        .addon-card-owner-info h4 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f5f5f7;
            margin-bottom: 0.25rem;
        }
        .addon-card-owner-info p {
            font-size: 0.85rem;
            color: #a1a1a6;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .addon-card-owner-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        .owner-action-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            padding: 0.6rem;
            border-radius: 10px;
            cursor: pointer;
            color: #a1a1a6;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .owner-action-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
        }
        .owner-action-btn:hover {
            background: rgba(255, 107, 0, 0.2);
            color: #ff6b00;
        }
        .owner-action-btn.delete:hover {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #a1a1a6;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
        }
        .delete-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .delete-modal.active {
            display: flex;
        }
        .delete-modal-content {
            background: #1a1a1c;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            border: 1px solid rgba(255, 59, 48, 0.3);
            text-align: center;
        }
        .delete-modal-content h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #ff3b30;
        }
        .delete-modal-content p {
            color: #a1a1a6;
            margin-bottom: 1.5rem;
        }
        .delete-modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            color: #a1a1a6;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-delete {
            background: #ff3b30;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        .profile-header {
            margin-bottom: 2rem;
        }
        .profile-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #f5f5f7;
        }
        .profile-header p {
            color: #a1a1a6;
        }
        @media (max-width: 768px) {
            .addons-grid {
                grid-template-columns: 1fr;
            }
            .navbar { left: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="sidebar-overlay" id="overlay"></div>
    <div class="custom-notification" id="customNotification">
        <div class="notification-content">
            <span class="notification-message" id="notificationMessage"></span>
        </div>
    </div>
    <div class="delete-modal" id="deleteModal">
        <div class="delete-modal-content">
            <h3>¿Eliminar Complemento?</h3>
            <p>Esta acción no se puede deshacer</p>
            <div class="delete-modal-buttons">
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancelar</button>
                <button class="btn-delete" id="confirmDeleteBtn">Eliminar</button>
            </div>
        </div>
    </div>
    <aside class="sidebar" id="sidebar">
        <div class="user-profile-section" id="profileSection">
            <div class="sidebar-avatar" id="sidebarAvatarIcon">
                <div class="u-head"></div>
                <div class="u-body"></div>
            </div>
            <div class="user-name" id="userNameDisplay">Usuario</div>
        </div>
        <nav class="nav-menu">
            <a href="../index.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Inicio
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Skins
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                Servidores
            </a>
            <a href="post.html" class="nav-item" id="publishNav">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                Publicar
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Categorías
            </a>
            <a href="#" class="nav-item" id="settingsNav">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Ajustes
            </a>
            <div class="bottom-section" id="authBottomSection">
                <a href="../sv/login.html" class="nav-item" id="loginNav">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Iniciar Sesión
                </a>
                <a href="../sv/register.html" class="nav-item" id="registerNav">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="16"/><line x1="16" y1="12" x2="24" y2="12"/></svg>
                    Crear Cuenta
                </a>
                <a href="#" class="nav-item" id="logoutNav" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Cerrar Sesión
                </a>
            </div>
        </nav>
    </aside>
    <div class="main-wrapper">
        <header class="navbar" id="mainNavbar">
            <img src="../img/logo.png" alt="Logo" class="logo-top">
            <div class="profile-trigger" id="toggleBtn">
                <div class="u-head"></div>
                <div class="u-body"></div>
            </div>
        </header>
        <main class="profile-container">
            <div class="profile-header">
                <h1>Mis Publicaciones</h1>
                <p>Gestiona tus complementos publicados</p>
            </div>
            <div id="addonsListContainer"></div>
        </main>
    </div>
    <script>
        const supabaseUrl = 'https://tauciflgtvuuoqqxzucy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhdWNpZmxndHZ1dW9xcXh6dWN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjY1NTUsImV4cCI6MjA5MDY0MjU1NX0.z8eV2KRnq16C5obuyPKhUmeJnGfci9lH-o40QIJuJ5o';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const toggleBtn = document.getElementById('toggleBtn');
        const navbar = document.getElementById('mainNavbar');
        const loginNav = document.getElementById('loginNav');
        const registerNav = document.getElementById('registerNav');
        const logoutNav = document.getElementById('logoutNav');
        const publishNav = document.getElementById('publishNav');
        const settingsNav = document.getElementById('settingsNav');
        const profileSection = document.getElementById('profileSection');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const sidebarAvatar = document.getElementById('sidebarAvatarIcon');
        const profileTrigger = document.getElementById('toggleBtn');
        const customNotification = document.getElementById('customNotification');
        const addonsContainer = document.getElementById('addonsListContainer');
        const deleteModal = document.getElementById('deleteModal');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        
        let currentUser = null;
        let pendingDeleteAddon = null;
        
        function showNotification(message) {
            const notificationMessage = document.getElementById('notificationMessage');
            notificationMessage.textContent = message;
            customNotification.classList.add('show');
            setTimeout(() => {
                customNotification.classList.remove('show');
            }, 3000);
        }
        
        function getCurrentSession() {
            const session = localStorage.getItem('mc_session');
            if (session) {
                try {
                    return JSON.parse(session);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }
        
        function logout() {
            localStorage.removeItem('mc_session');
            localStorage.removeItem('mc_user');
            window.location.href = '../index.html';
        }
        
        async function getUserAddons(userId) {
            const { data, error } = await supabaseClient
                .from('addons')
                .select('*')
                .eq('author_id', userId)
                .order('publish_date', { ascending: false });
            if (error) throw error;
            return data || [];
        }
        
        async function deleteAddon(addonId) {
            const { error } = await supabaseClient
                .from('addons')
                .delete()
                .eq('addon_id', addonId);
            if (error) throw error;
        }
        
        function editAddon(addon) {
            localStorage.setItem('editingAddon', JSON.stringify(addon));
            window.location.href = 'publish.html';
        }
        
        function openDeleteModal(addon) {
            pendingDeleteAddon = addon;
            deleteModal.classList.add('active');
        }
        
        function closeDeleteModal() {
            deleteModal.classList.remove('active');
            pendingDeleteAddon = null;
        }
        
        async function confirmDelete() {
            if (pendingDeleteAddon) {
                await deleteAddon(pendingDeleteAddon.addon_id);
                closeDeleteModal();
                await loadAddons();
                showNotification('Complemento eliminado correctamente');
            }
        }
        
        confirmDeleteBtn.addEventListener('click', confirmDelete);
        
        function formatText(text) {
            if (!text) return '';
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }
        
        function renderAddons(addons) {
            if (!addonsContainer) return;
            
            if (addons.length === 0) {
                addonsContainer.innerHTML = `
                    <div class="empty-state">
                        <p>No has publicado ningún complemento aún.</p>
                        <p style="margin-top: 0.5rem; font-size: 0.85rem;">¡Comienza a compartir tus creaciones!</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="addons-grid">';
            addons.forEach(addon => {
                const imageUrl = addon.icon_url || addon.banner_url || '../img/default-addon.png';
                const formattedDescription = formatText(addon.description.substring(0, 100) + (addon.description.length > 100 ? '...' : ''));
                const safeAddon = JSON.stringify(addon).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                html += `
                    <div class="addon-card-owner">
                        <img src="${imageUrl}" alt="${addon.title}" onerror="this.src='../img/default-addon.png'">
                        <div class="addon-card-owner-info">
                            <h4>${addon.title}</h4>
                            <p>${formattedDescription}</p>
                        </div>
                        <div class="addon-card-owner-actions">
                            <button class="owner-action-btn" onclick='editAddon(${safeAddon})'>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                                Editar
                            </button>
                            <button class="owner-action-btn delete" onclick='openDeleteModal(${safeAddon})'>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line x1="10" y1="11" x2="10" y2="17"/>
                                    <line x1="14" y1="11" x2="14" y2="17"/>
                                </svg>
                                Eliminar
                            </button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            addonsContainer.innerHTML = html;
        }
        
        async function loadAddons() {
            if (!currentUser) return;
            try {
                const addons = await getUserAddons(currentUser.id);
                renderAddons(addons);
            } catch (error) {
                console.error('Error loading addons:', error);
                showNotification('Error al cargar tus complementos');
            }
        }
        
        async function checkAuthState() {
            const session = getCurrentSession();
            if (session && session.user_id) {
                const { data: userData, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', session.user_id)
                    .single();
                if (userData && !error) {
                    currentUser = userData;
                    if (loginNav) loginNav.style.display = 'none';
                    if (registerNav) registerNav.style.display = 'none';
                    if (logoutNav) logoutNav.style.display = 'flex';
                    if (publishNav) publishNav.classList.remove('disabled');
                    if (settingsNav) settingsNav.classList.remove('disabled');
                    if (userNameDisplay) {
                        userNameDisplay.textContent = userData.public_name || userData.username;
                    }
                    if (sidebarAvatar && userData.avatar_url) {
                        sidebarAvatar.style.backgroundImage = `url('${userData.avatar_url}')`;
                        const head = sidebarAvatar.querySelector('.u-head');
                        const body = sidebarAvatar.querySelector('.u-body');
                        if (head) head.style.opacity = '0';
                        if (body) body.style.opacity = '0';
                    }
                    if (profileTrigger && userData.avatar_url) {
                        profileTrigger.style.backgroundImage = `url('${userData.avatar_url}')`;
                        const head = profileTrigger.querySelector('.u-head');
                        const body = profileTrigger.querySelector('.u-body');
                        if (head) head.style.opacity = '0';
                        if (body) body.style.opacity = '0';
                    }
                    await loadAddons();
                } else {
                    localStorage.removeItem('mc_session');
                    window.location.href = '../sv/login.html';
                }
            } else {
                window.location.href = '../sv/login.html';
            }
        }
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
        
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });
        }
        
        if (overlay) {
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
        
        if (logoutNav) {
            logoutNav.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
        }
        
        if (profileSection) {
            profileSection.addEventListener('click', (e) => {
                e.preventDefault();
                if (currentUser) {
                    window.location.href = 'profile.html';
                } else {
                    showNotification('Debes iniciar sesión para ver tu perfil');
                }
            });
        }
        
        window.editAddon = editAddon;
        window.openDeleteModal = openDeleteModal;
        window.closeDeleteModal = closeDeleteModal;
        
        checkAuthState();
    </script>
</body>
</html>
